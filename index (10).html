<script>
  // Router: check saved default page, redirect immediately
  // Default is 'share' unless user has switched to 'emperor'
  const dest = localStorage.getItem('puzzlr_default_page') || 'share';
  if (dest === 'emperor') {
    window.location.replace('emperor.html');
  } else {
    window.location.replace('share_index.html');
  }
